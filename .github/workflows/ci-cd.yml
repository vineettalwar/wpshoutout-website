name: CI / CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Required for OIDC-based GitHub Pages deployment (no stored deploy tokens)
permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment at a time; cancel in-progress runs on new push
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  # ─── CI: validate every push and PR ────────────────────────────────────────
  validate:
    name: Build & Type-check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type-check frontend
        run: pnpm --filter @workspace/wpshoutout run typecheck

      - name: Type-check API server
        run: pnpm --filter @workspace/api-server run typecheck

      # ── Resolve the Pages base path ──────────────────────────────────────
      # Default: derive from repo name → /<repo>/ on GitHub Pages.
      # Override: set repository variable PAGES_BASE_PATH to "/" for a custom
      # domain or org/user site served at root.
      - name: Resolve BASE_PATH
        id: base_path
        run: |
          if [ -n "${{ vars.PAGES_BASE_PATH }}" ]; then
            BASE_PATH="${{ vars.PAGES_BASE_PATH }}"
          else
            REPO_NAME="${GITHUB_REPOSITORY##*/}"
            BASE_PATH="/${REPO_NAME}/"
          fi
          echo "value=${BASE_PATH}" >> $GITHUB_OUTPUT

      - name: Build frontend
        env:
          PORT: "3000"
          BASE_PATH: ${{ steps.base_path.outputs.value }}
          NODE_ENV: production
          # Full URL of the deployed API server, e.g. https://wpshoutout.onrender.com
          # Set this as a GitHub secret named API_BASE_URL.
          # When unset the frontend falls back to same-origin "/" (works on Replit).
          VITE_API_BASE_URL: ${{ secrets.API_BASE_URL }}
        run: pnpm --filter @workspace/wpshoutout run build

      - name: Build API server
        env:
          NODE_ENV: production
        run: pnpm --filter @workspace/api-server run build

      # SPA fallback: GitHub Pages serves 404.html for unknown paths.
      # Copying index.html → 404.html lets Wouter handle all client-side routes
      # so deep-links and page refreshes work correctly.
      - name: Add SPA 404 fallback
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: cp artifacts/wpshoutout/dist/public/index.html artifacts/wpshoutout/dist/public/404.html

      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/upload-pages-artifact@v3
        with:
          path: artifacts/wpshoutout/dist/public

  # ─── CD: deploy frontend to GitHub Pages on every merge to main ─────────────
  deploy-frontend:
    name: Deploy Frontend (GitHub Pages)
    needs: validate
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # ─── CD: deploy API server via deploy hook on every merge to main ────────────
  #
  # Works with any hosting platform that provides a deploy hook URL:
  #   • Render  — Dashboard → service → Settings → Deploy Hook
  #   • Railway — Project → Settings → Webhooks → Deploy Hook
  #   • Fly.io  — replace this job with flyctl deploy (add FLY_API_TOKEN secret)
  #
  # Add the hook URL as a GitHub secret named API_DEPLOY_HOOK.
  # If the secret is not set, this job warns but does NOT fail the workflow —
  # allowing the frontend deploy to succeed while the API is still being set up.
  deploy-api:
    name: Deploy API Server
    needs: validate
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Trigger API deployment via deploy hook
        run: |
          HOOK="${{ secrets.API_DEPLOY_HOOK }}"
          if [ -z "$HOOK" ]; then
            echo "::warning::API_DEPLOY_HOOK secret is not set — API server was NOT deployed automatically."
            echo "Add a deploy hook URL from your hosting provider (Render, Railway, etc.) as the"
            echo "API_DEPLOY_HOOK secret in GitHub → Settings → Secrets and variables → Actions."
            exit 0
          fi
          echo "Triggering API deployment..."
          RESPONSE=$(curl -s -o response.txt -w "%{http_code}" -X POST "$HOOK")
          echo "HTTP status: $RESPONSE"
          cat response.txt
          if [[ "$RESPONSE" -lt 200 || "$RESPONSE" -ge 300 ]]; then
            echo "::error::Deploy hook returned HTTP $RESPONSE — deployment may have failed."
            exit 1
          fi
          echo "API deployment triggered successfully."
